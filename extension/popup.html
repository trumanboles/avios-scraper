<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Avios Reminder</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; width: 340px; color: #111827; }
      .wrap { padding: 12px; }
      .muted { color: #6b7280; font-size: 12px; }
      .card { border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; margin-top: 10px; }
      button { border: 0; border-radius: 8px; padding: 8px 10px; cursor: pointer; }
      .primary { background: #0f766e; color: white; }
      .subtle { background: #e5e7eb; color: #111827; }
      .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
      input[type="search"] { width: 100%; border: 1px solid #d1d5db; border-radius: 8px; padding: 8px; }
      ul { list-style: none; margin: 8px 0 0; padding: 0; max-height: 220px; overflow: auto; }
      li { border-top: 1px solid #f3f4f6; padding: 8px 0; }
      .name { font-weight: 600; }
      .actions { margin-top: 8px; display: flex; gap: 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="row">
        <strong>Avios Reminder</strong>
        <a href="options.html" target="_blank">Settings</a>
      </div>
      <div id="app"></div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
